<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Enunciado Importante</title>
  <style>
    body, table, td, p, a, li, blockquote {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      margin: 0;
      padding: 0;
    }
    table, td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
      border-collapse: collapse;
    }
    img { border: 0; display: block; outline: none; text-decoration: none; }
    a { text-decoration: none; }
    body {
      background-color: #f3f4f6;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body style="background-color:#f3f4f6; margin:0; padding:0;">

<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f3f4f6;">
  <tr>
    <td align="center" style="padding:32px 16px;">

      <!-- Container 600px -->
      <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px; width:100%;">

        <!-- Top brand -->
        <tr>
          <td align="center" style="padding-bottom:10px;">
            <span style="font-size:12px; font-weight:600; color:#6b7280; letter-spacing:0.5px; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
              CEFCOCAPP
            </span>
          </td>
        </tr>

        <!-- ===== HEADER ===== -->
        <tr>
          <td style="background-color:#ffffff; border-radius:16px 16px 0 0; padding:40px 40px 8px 40px; text-align:center;">

            <!-- Ícono megáfono grande -->
            <table cellpadding="0" cellspacing="0" role="presentation" style="margin:0 auto 20px auto;">
              <tr>
                <td style="width:64px; height:64px; background-color:#f1f5f9; border-radius:50%; display: flex; justify-content: center; align-items: center;">
                  <span style="font-size:30px; line-height:64px; display:block;">📢</span>
                </td>
              </tr>
            </table>

            <!-- Curso -->
            <p style="font-size:11px; font-weight:700; color:#94a3b8; letter-spacing:1.4px; text-transform:uppercase; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0 0 10px 0;">
              {{asgnomCourse}}
            </p>

            <!-- Título principal -->
            <p style="font-size:26px; font-weight:800; color:#1a1a2e; line-height:1.25; letter-spacing:-0.4px; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0 0 28px 0;">
              ¡Nuevo Enunciado Importante!
            </p>

            <!-- Línea decorativa gris-azulada -->
            <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
              <tr>
                <td style="height:3px; background-color:#94a3b8; border-radius:2px;"></td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- ===== CARD ENUNCIADO ===== -->
        <tr>
          <td style="background-color:#ffffff; padding:28px 40px 36px 40px;">

            <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
              <tr>
                <!-- Borde izquierdo gris-pizarra -->
                <td width="4" style="background-color:#94a3b8; border-radius:4px 0 0 4px;">&nbsp;</td>

                <!-- Contenido de la card -->
                <td style="background-color:#f8fafc; border:1px solid #e2e8f0; border-left:none; border-radius:0 12px 12px 0; padding:20px 22px;">

                  <!-- Icono + badge ENUNCIADO -->
                  <table cellpadding="0" cellspacing="0" role="presentation" style="margin-bottom:14px;">
                    <tr>
                      <td valign="middle" style="padding-right:10px;">
                        <table cellpadding="0" cellspacing="0" role="presentation">
                          <tr>
                            <td style="width:38px; height:38px; background-color:#f1f5f9; border-radius:10px; text-align:center; vertical-align:middle;">
                              <span style="font-size:18px; line-height:38px; display:block;">📄</span>
                            </td>
                          </tr>
                        </table>
                      </td>
                      <td valign="middle">
                        <p style="font-size:11px; font-weight:700; color:#94a3b8; letter-spacing:1.4px; text-transform:uppercase; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0;">
                          ENUNCIADO
                        </p>
                      </td>
                    </tr>
                  </table>

                  <!-- Nombre del enunciado -->
                  <p style="font-size:17px; font-weight:700; color:#1a1a2e; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0 0 8px 0; line-height:1.3;">
                    {{astnomtrabajo}}
                  </p>

                  <!-- Descripción -->
                  <p style="font-size:13px; color:#4b5563; line-height:1.65; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0;">
                    {{astdesctrabajo}}
                  </p>

                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- Cierre redondeado inferior del blanco -->
        <tr>
          <td style="background-color:#ffffff; border-radius:0 0 16px 16px; height:8px;"></td>
        </tr>

        <!-- Spacer -->
        <tr><td style="height:24px;"></td></tr>

        <!-- ===== FOOTER ===== -->
        <tr>
          <td style="padding:20px; text-align:center;">
            <p style="font-size:14px; font-weight:700; color:#374151; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0 0 4px 0;">
              CEFCOCAPP
            </p>
            <p style="font-size:11px; color:#d1d5db; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; margin:0; text-transform:uppercase; letter-spacing:0.5px;">
              © 2026 CEFCOCAPP. All rights reserved.
            </p>
          </td>
        </tr>

      </table>
      <!-- /Container -->

    </td>
  </tr>
</table>

</body>
</html>
